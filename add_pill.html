<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Pill</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body data-page="add">

  <div class="container">

    <h1 class="title">Add Pill</h1>

    <div class="card">

      <label class="label">Pill Name</label>
      <input id="pillName" type="text" class="input" placeholder="e.g., Metformin">

      <label class="label">Dosage (optional)</label>
      <input id="pillDosage" type="text" class="input" placeholder="e.g., 500mg">

      <label class="label">Times of Day</label>
      <div id="timesContainer"></div>

      <button id="addTimeBtn" class="secondary-btn" style="margin-bottom: 20px;">
        + Add Time
      </button>

      <label class="label">Start Date</label>
      <input id="startDate" type="date" class="input">

      <label class="label">End Date (optional)</label>
      <input id="endDate" type="date" class="input">

      <button id="savePillBtn" class="primary-btn" style="margin-top: 20px;">
        Save Pill
      </button>

      <p id="saveMsg" class="success"></p>

    </div>

    <button id="backBtn" class="secondary-btn" style="margin-top: 30px;">
      Back to Today
    </button>

  </div>

  <script type="module" src="js/add-pill.js"></script>
<nav class="bottom-nav">
  <a href="today.html" class="nav-item" data-page="today">
    <span class="nav-icon">📅</span>
    <span class="nav-label">Today</span>
  </a>

  <a href="add-pill.html" class="nav-item" data-page="add">
    <span class="nav-icon">➕</span>
    <span class="nav-label">Add Pill</span>
  </a>

  <a href="history.html" class="nav-item" data-page="history">
    <span class="nav-icon">📘</span>
    <span class="nav-label">History</span>
  </a>

  <a href="profile.html" class="nav-item" data-page="profile">
    <span class="nav-icon">👤</span>
    <span class="nav-label">Profile</span>
  </a>
</nav>

<script src="js/nav.js"></script>

</body>
</html>
