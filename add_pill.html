<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Pill</title>

  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Add a Pill</h1>
  </header>

  <!-- Main Content -->
  <main>
    <form id="addPillForm" class="form-container">

      <label for="pillName">Pill Name</label>
      <input type="text" id="pillName" name="pillName" required />

      <label for="pillTime">Time</label>
      <input type="time" id="pillTime" name="pillTime" required />

      <p id="errorMsg" class="error"></p>

      <button type="submit" class="btn-primary">Save Pill</button>
    </form>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="today.html">Today</a>
    <a href="add_pill.html" class="active">Add Pill</a>
    <a href="history.html">History</a>
    <a href="profile.html">Profile</a>
  </nav>

  <!-- Scripts -->
  <script type="module" src="js/supabase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/add-pill.js"></script>

</body>
</html>
