<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pill Tracker – Sign Up</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div class="container">

    <h1 class="title">Create Account</h1>

    <div class="card">

      <h2 class="section-title">Sign Up</h2>

      <form id="signupForm">
        <input name="email" type="email" placeholder="Email" class="input" required>
        <input name="password" type="password" placeholder="Password" class="input" required>
        <button type="submit" class="primary-btn">Sign Up</button>
      </form>

      <p class="small-text">Already have an account?</p>
      <a href="login.html" class="secondary-btn">Login</a>

      <p id="errorMsg" class="error"></p>

    </div>

  </div>

<script type="module" src="js/firebase.js?v=10"></script>
<script type="module" src="js/auth.js?v=10"></script>

</body>
</html>
