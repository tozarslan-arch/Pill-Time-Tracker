<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pill Tracker – Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div class="container">

    <h1 class="title">Pill Tracker</h1>

    <div class="card">

      <h2 class="section-title">Login</h2>

      <form id="loginForm">
        <input name="email" type="email" placeholder="Email" class="input" required>
        <input name="password" type="password" placeholder="Password" class="input" required>
        <button type="submit" class="primary-btn">Login</button>
      </form>

      <p class="small-text">Don’t have an account?</p>
      <a href="signup.html" class="secondary-btn">Create Account</a>

      <p id="errorMsg" class="error"></p>

    </div>

  </div>

  <!-- Correct script order -->
<script type="module" src="js/supabase.js"></script>
<script type="module" src="js/auth.js"></script>


</body>
</html>
